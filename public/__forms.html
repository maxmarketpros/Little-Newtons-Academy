<html>
  <head></head>
  <body>
    <!-- Tour Request Form -->
    <form name="tour-request" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="tour-request" />
      <input name="parent-name" type="text" />
      <input name="phone" type="tel" />
      <input name="email" type="email" />
      <input name="location" type="text" />
      <input name="child-1-name" type="text" />
      <input name="child-1-age" type="text" />
      <input name="child-2-name" type="text" />
      <input name="child-2-age" type="text" />
      <input name="child-3-name" type="text" />
      <input name="child-3-age" type="text" />
      <input name="child-4-name" type="text" />
      <input name="child-4-age" type="text" />
      <input name="message" type="text" />
    </form>

    <!-- Contact Form -->
    <form name="contact" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" type="text" />
      <input name="phone" type="tel" />
      <input name="email" type="email" />
      <input name="subject" type="text" />
      <input name="message" type="text" />
    </form>
  </body>
</html>
